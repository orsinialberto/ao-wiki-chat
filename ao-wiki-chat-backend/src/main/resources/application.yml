spring:
  application:
    name: ao-wiki-chat
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: jdbc:postgresql://localhost:5432/wikichat
    username: wikichat_user
    password: wikichat_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000  
  jpa:
    open-in-view: false 
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: doc-processor-

server:
  port: 8080

# Embedding provider: "gemini" | "ollama"
app:
  embedding:
    provider: ollama

gemini:
  api:
    # Optional: omit or set GEMINI_API_KEY for Gemini chat. If unset, app starts but chat will fail at first use.
    key: ${GEMINI_API_KEY:}
  chat:
    model: gemini-2.5-flash-lite
    temperature: 0.5
    max-tokens: 2048
  embedding:
    model: gemini-embedding-001
    dimension: 1024
    batch-size: 25
    batch-delay-ms: 15000
    max-retries: 5
    retry-base-delay-ms: 10000
  rate-limit:
    requests-per-minute: 10
    tokens-per-day: 2000000

ollama:
  base-url: http://localhost:11434
  embedding:
    model: nomic-embed-text
    dimension: 1024

upload:
  allowed-types: application/pdf,text/markdown,text/html,text/plain
  storage-directory: ./uploads

rag:
  chunk:
    size: 300
    overlap: 30
  search:
    top-k: 6
    similarity-threshold: 0.5
  vector:
    dimension: 1024
    distance-metric: cosine
  conversation:
    max-history-messages: 5  # Maximum number of previous messages to include
    include-history: true     # Enable/disable conversation context (default: true)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.example.ao_wiki_chat: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    dev.langchain4j: DEBUG
    # Avoid verbose 429/rate-limit logs: RetryUtils logs full exception body + stack at WARN; we log a single line in GeminiEmbeddingService
    dev.langchain4j.internal.RetryUtils: ERROR
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){blue} %clr([%5p]){highlight} %clr(%-40.40logger{39}){cyan} : %m%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

