spring:
  application:
    name: ao-wiki-chat
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: jdbc:postgresql://localhost:5432/wikichat
    username: wikichat_user
    password: wikichat_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000  
  jpa:
    open-in-view: false 
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: doc-processor-

server:
  port: 8080

# Embedding and chat provider (ollama)
app:
  embedding:
    provider: ollama
  chat:
    provider: ollama

ollama:
  base-url: http://localhost:11434
  embedding:
    model: nomic-embed-text
    dimension: 768
  chat:
    model: "llama3.2:3b"
    temperature: 0.5
    num-predict: 2048
    timeout-seconds: 120

upload:
  allowed-types: application/pdf,text/markdown,text/html,text/plain
  storage-directory: ./uploads

rag:
  chunk:
    size: 300
    overlap: 150
  search:
    top-k: 6
    similarity-threshold: 0.5
  vector:
    dimension: 768
    distance-metric: cosine
  # Reranker: second-stage ranking for better context quality (optional)
  reranker:
    enabled: false
    candidate-factor: 3   # When enabled: fetch (top-k * candidate-factor) from vector search, then rerank to top-k
  conversation:
    max-history-messages: 5  # Maximum number of previous messages to include
    include-history: true     # Enable/disable conversation context (default: true)

# Cohere API (only required when rag.reranker.enabled=true)
cohere:
  api:
    key: ${COHERE_API_KEY:}
  rerank:
    model: rerank-v3.5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.example.ao_wiki_chat: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    dev.langchain4j: DEBUG
    dev.langchain4j.internal.RetryUtils: ERROR
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){blue} %clr([%5p]){highlight} %clr(%-40.40logger{39}){cyan} : %m%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

